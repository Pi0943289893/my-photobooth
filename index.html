<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Photobooth Pro - Print & Sticker Ready</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Noto+Sans+Thai:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif; touch-action: manipulation; }
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
    .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .btn-capture { background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3); background-size: 300% 300%; animation: gradient-shift 3s ease infinite; }
    @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .photo-slot { background: #1a1a2e; border: 2px dashed rgba(255, 255, 255, 0.3); overflow: hidden; position: relative; }
    .sticker-item { position: absolute; cursor: move; touch-action: none; user-select: none; z-index: 50; font-size: 2.5rem; line-height: 1; }
    .flash-effect { animation: flash 0.3s ease-out; }
    @keyframes flash { 0% { background: white; } 100% { background: transparent; } }
    .countdown-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); font-size: 6rem; color: white; z-index: 100; }
    #camera { transform: scaleX(-1); }
    
    /* แก้ไข CSS สำหรับการปริ้นรูปภาพให้แสดงผล */
    @media print {
      body * { visibility: hidden; }
      #captureArea, #captureArea * { 
        visibility: visible !important; 
        -webkit-print-color-adjust: exact !important; 
        print-color-adjust: exact !important;
      }
      #captureArea { 
        position: absolute; 
        left: 50%; 
        top: 0; 
        transform: translateX(-50%); 
        width: auto !important;
        border: none !important;
        box-shadow: none !important;
      }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="h-full gradient-bg overflow-x-hidden">
  <div class="min-h-full p-4 no-print">
    <header class="text-center mb-6">
      <h1 class="text-3xl font-bold text-white drop-shadow-lg">✨ Photobooth Studio ✨</h1>
      <p class="text-white/80 text-sm">ถ่ายภาพ • แต่งสติกเกอร์ • ปริ้น & ดาวน์โหลด</p>
    </header>

    <div class="max-w-5xl mx-auto grid lg:grid-cols-2 gap-6">
      <div class="glass-card rounded-3xl p-4">
        <div class="relative aspect-[4/3] rounded-2xl overflow-hidden bg-black shadow-2xl">
          <video id="camera" autoplay playsinline muted class="w-full h-full object-cover"></video>
          <canvas id="canvas" class="hidden"></canvas>
          <div id="countdown" class="countdown-overlay hidden">3</div>
          <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-2">
            <button id="captureBtn" class="btn-capture px-8 py-3 rounded-full text-white font-bold shadow-xl">📸 ถ่ายรูป!</button>
            <button id="switchCamBtn" class="bg-white/20 p-3 rounded-full text-white">🔄 สลับกล้อง</button>
          </div>
        </div>
        <div class="mt-4 overflow-x-auto">
          <div class="flex gap-2 pb-2">
            <button class="filter-btn px-4 py-1 rounded-lg bg-white/20 text-white text-xs active" data-filter="none">Normal</button>
            <button class="filter-btn px-4 py-1 rounded-lg bg-white/20 text-white text-xs" data-filter="grayscale(100%)">B&W</button>
            <button class="filter-btn px-4 py-1 rounded-lg bg-white/20 text-white text-xs" data-filter="sepia(80%)">Retro</button>
            <button class="filter-btn px-4 py-1 rounded-lg bg-white/20 text-white text-xs" data-filter="brightness(1.2) contrast(1.1)">Bright</button>
          </div>
        </div>
      </div>

      <div class="glass-card rounded-3xl p-4">
        <p class="text-white text-xs mb-2">🎨 เลือกเทมเพลต:</p>
        <div id="templateSelect" class="flex gap-2 mb-4 overflow-x-auto p-1"></div>

        <p class="text-white text-xs mb-2">🎁 แตะสติกเกอร์เพื่อเพิ่ม (ลากวางได้):</p>
        <div id="stickerTray" class="mb-4 bg-black/20 p-2 rounded-xl flex gap-4 overflow-x-auto text-3xl">
          <span class="cursor-pointer">❤️</span><span class="cursor-pointer">✨</span><span class="cursor-pointer">🔥</span>
          <span class="cursor-pointer">👑</span><span class="cursor-pointer">🌸</span><span class="cursor-pointer">🎀</span>
          <span class="cursor-pointer">⭐</span><span class="cursor-pointer">🍦</span><span class="cursor-pointer">🍀</span>
        </div>

        <div class="flex justify-center mb-6">
          <div id="captureArea" class="relative p-3 rounded-xl bg-gradient-to-br from-pink-400 to-purple-500 shadow-2xl transition-all">
            <div id="templateContent" class="bg-white p-2 rounded-lg grid gap-2"></div>
            <p class="text-[10px] text-center text-white mt-2 font-bold tracking-widest">📸 PHOTOBOOTH STUDIO</p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <button id="resetBtn" class="py-3 bg-red-500/50 text-white rounded-xl text-sm font-bold">🔄 รีเซ็ตใหม่</button>
          <button id="printBtn" class="py-3 bg-blue-500 text-white rounded-xl text-sm font-bold">🖨️ สั่งปริ้นรูป</button>
          <button id="downloadBtn" class="col-span-2 py-3 bg-green-500 text-white rounded-xl text-sm font-bold shadow-lg">💾 ดาวน์โหลดรูปภาพ (พร้อมสติกเกอร์)</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let photos = [];
    let currentFilter = 'none';
    let currentFacingMode = 'user';
    let stream = null;
    let currentTemplate = 'strip4';

    const templates = {
      strip4: { slots: 4, cols: 1, width: '160px', name: 'Strip 4' },
      strip3: { slots: 3, cols: 1, width: '160px', name: 'Strip 3' },
      grid4: { slots: 4, cols: 2, width: '240px', name: 'Grid 4' },
      duo: { slots: 2, cols: 1, width: '180px', name: 'Duo 2' },
      single: { slots: 1, cols: 1, width: '220px', name: 'Single' }
    };

    const tSelect = document.getElementById('templateSelect');
    Object.keys(templates).forEach(key => {
        const btn = document.createElement('button');
        btn.className = `px-3 py-1 rounded-lg text-xs whitespace-nowrap ${currentTemplate === key ? 'bg-pink-500 text-white' : 'bg-white/20 text-white'}`;
        btn.textContent = templates[key].name;
        btn.onclick = () => {
            currentTemplate = key;
            document.querySelectorAll('#templateSelect button').forEach(b => b.className = b.className.replace('bg-pink-500 text-white', 'bg-white/20 text-white'));
            btn.className = btn.className.replace('bg-white/20 text-white', 'bg-pink-500 text-white');
            renderTemplate();
        };
        tSelect.appendChild(btn);
    });

    async function initCamera() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: false });
        document.getElementById('camera').srcObject = stream;
      } catch (err) { alert("เข้าถึงกล้องไม่ได้ กรุณาอนุญาตสิทธิ์ครับ"); }
    }

    document.getElementById('captureBtn').onclick = async () => {
      if (photos.length >= templates[currentTemplate].slots) return alert("เต็มแล้วครับ!");
      let count = 3;
      const overlay = document.getElementById('countdown');
      overlay.classList.remove('hidden');
      const timer = setInterval(() => {
        count--; overlay.textContent = count;
        if (count <= 0) {
          clearInterval(timer); overlay.classList.add('hidden'); overlay.textContent = '3';
          capture();
        }
      }, 800);
    };

    function capture() {
      const video = document.getElementById('camera');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.filter = currentFilter;
      ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);
      photos.push(canvas.toDataURL('image/jpeg'));
      renderTemplate();
      video.parentElement.classList.add('flash-effect');
      setTimeout(() => video.parentElement.classList.remove('flash-effect'), 300);
    }

    function renderTemplate() {
      const container = document.getElementById('templateContent');
      const config = templates[currentTemplate];
      document.getElementById('captureArea').style.width = config.width;
      container.className = `bg-white p-2 rounded-lg grid gap-2 grid-cols-${config.cols}`;
      container.innerHTML = '';
      for (let i = 0; i < config.slots; i++) {
        const div = document.createElement('div');
        div.className = 'photo-slot aspect-[4/3] rounded shadow-inner flex items-center justify-center text-gray-500 text-xs';
        if (photos[i]) div.innerHTML = `<img src="${photos[i]}" class="w-full h-full object-cover border-0">`;
        else div.textContent = i + 1;
        container.appendChild(div);
      }
    }

    document.querySelectorAll('#stickerTray span').forEach(opt => {
      opt.onclick = () => {
        const s = document.createElement('div');
        s.className = 'sticker-item';
        s.innerHTML = opt.innerHTML;
        s.style.left = '40%'; s.style.top = '40%';
        makeDraggable(s);
        document.getElementById('captureArea').appendChild(s);
      };
    });

    function makeDraggable(el) {
      let p1, p2, p3, p4;
      el.onmousedown = el.ontouchstart = (e) => {
        const ev = e.type === 'touchstart' ? e.touches[0] : e;
        p3 = ev.clientX; p4 = ev.clientY;
        document.onmouseup = document.ontouchend = () => { document.onmousemove = document.ontouchmove = null; };
        document.onmousemove = document.ontouchmove = (e2) => {
          const ev2 = e2.type === 'touchmove' ? e2.touches[0] : e2;
          p1 = p3 - ev2.clientX; p2 = p4 - ev2.clientY;
          p3 = ev2.clientX; p4 = ev2.clientY;
          el.style.top = (el.offsetTop - p2) + "px";
          el.style.left = (el.offsetLeft - p1) + "px";
        };
      };
    }

    document.getElementById('downloadBtn').onclick = async () => {
        if (photos.length === 0) return alert("ถ่ายรูปก่อนนะครับ");
        const area = document.getElementById('captureArea');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const scale = 2;
        canvas.width = area.offsetWidth * scale; canvas.height = area.offsetHeight * scale;
        ctx.scale(scale, scale);

        const grad = ctx.createLinearGradient(0, 0, 0, area.offsetHeight);
        grad.addColorStop(0, '#f472b6'); grad.addColorStop(1, '#a855f7');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, area.offsetWidth, area.offsetHeight);

        const whitePad = document.getElementById('templateContent');
        ctx.fillStyle = "white";
        ctx.fillRect(whitePad.offsetLeft, whitePad.offsetTop, whitePad.offsetWidth, whitePad.offsetHeight);

        const images = area.querySelectorAll('img');
        for(let img of images) {
            const rect = img.parentElement;
            ctx.drawImage(img, rect.offsetLeft + whitePad.offsetLeft, rect.offsetTop + whitePad.offsetTop, img.offsetWidth, img.offsetHeight);
        }

        const stickers = area.querySelectorAll('.sticker-item');
        stickers.forEach(s => {
            ctx.font = "40px Arial"; ctx.textBaseline = "top";
            ctx.fillText(s.innerText, s.offsetLeft, s.offsetTop);
        });
        
        ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
        ctx.fillText("📸 PHOTOBOOTH STUDIO", area.offsetWidth/2, area.offsetHeight - 15);

        const link = document.createElement('a');
        link.download = `photobooth-${Date.now()}.png`;
        link.href = canvas.toDataURL(); link.click();
    };

    document.getElementById('printBtn').onclick = () => {
        if (photos.length === 0) return alert("ถ่ายรูปก่อนนะครับ");
        window.print();
    };

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        currentFilter = btn.dataset.filter;
        document.getElementById('camera').style.filter = currentFilter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-pink-500'));
        btn.classList.add('bg-pink-500');
      };
    });

    document.getElementById('switchCamBtn').onclick = () => {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      initCamera();
    };

    document.getElementById('resetBtn').onclick = () => {
      if(confirm("ล้างรูปทั้งหมดใช่ไหม?")) {
        photos = []; document.querySelectorAll('.sticker-item').forEach(s => s.remove());
        renderTemplate();
      }
    };

    initCamera(); renderTemplate();
  </script>
</body>
</html>
