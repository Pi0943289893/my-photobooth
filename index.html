<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMUTT Photobooth FIX</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
    * { font-family: sans-serif; touch-action: manipulation; }
    .gradient-bg { background: #b91c1c; } 
    #captureArea { width: 220px; height: 600px; position: relative; background: #fff; overflow: hidden; }
    #captureArea.landscape { width: 350px; height: 233px; }
    #captureArea.portrait-4x6 { width: 233px; height: 350px; }
    #frameOverlay { position: absolute; inset: 0; z-index: 50; background-size: 100% 100%; pointer-events: none; }
    .photo-item { position: absolute; z-index: 10; background: #eee; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    
    /* พิกัดบนหน้าจอ Preview */
    .photo-1 { left: 15px; width: 190px; height: 140px; top: 112px; }
    .photo-2 { left: 15px; width: 190px; height: 140px; top: 268px; }
    .photo-3 { left: 15px; width: 190px; height: 140px; top: 424px; }
    
    .landscape .photo-1 { left: 20px; width: 145px; height: 90px; top: 20px; }
    .landscape .photo-2 { left: 185px; width: 145px; height: 90px; top: 20px; }
    .landscape .photo-3 { left: 20px; width: 145px; height: 90px; top: 120px; }
    .landscape .photo-4 { left: 185px; width: 145px; height: 90px; top: 120px; }

    .rounded-slot .photo-item { border-radius: 20px; }
    .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border-radius: 2rem; padding: 1.5rem; }
    .mirror { transform: scaleX(-1); }
  </style>
</head>
<body class="h-full gradient-bg p-4 flex flex-col items-center">
  
  <div class="max-w-6xl w-full grid lg:grid-cols-3 gap-6">
    <div class="glass-card text-white text-center">
      <h2 class="mb-4">เลือกกรอบ</h2>
      <div class="grid grid-cols-2 gap-2">
         <button class="bg-white/20 p-2 rounded" onclick="changeFrame('myframe.png', '2x6', 'strip', 'square')">2x6 Standard</button>
         <button class="bg-white/20 p-2 rounded" onclick="changeFrame('frame_pink.png', '2x6', 'strip', 'rounded')">2x6 Rounded</button>
      </div>
    </div>

    <div class="glass-card text-center">
      <video id="camera" autoplay playsinline muted class="mirror w-full rounded-xl mb-4"></video>
      <button id="captureBtn" class="w-full py-4 bg-white text-red-600 rounded-2xl font-bold">📸 ถ่ายรูป</button>
    </div>

    <div class="glass-card flex flex-col items-center">
      <div id="captureArea" class="square-slot">
        <div id="frameOverlay" style="background-image: url('myframe.png');"></div>
        <div id="photo1" class="photo-item photo-1"></div>
        <div id="photo2" class="photo-item photo-2"></div>
        <div id="photo3" class="photo-item photo-3"></div>
        <div id="photo4" class="photo-item photo-4"></div>
      </div>
      <div class="grid grid-cols-2 gap-2 w-full mt-4">
        <button id="resetBtn" class="bg-black/50 text-white p-3 rounded-xl">ล้าง</button>
        <button id="downloadBtn" class="bg-green-600 text-white p-3 rounded-xl font-bold">💾 บันทึกรูป</button>
      </div>
    </div>
  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    let photos = [];
    let currentSize = '2x6';
    let currentLayout = 'strip';
    let currentFrameUrl = 'myframe.png';

    // ฟังก์ชันเปลี่ยนกรอบ
    function changeFrame(url, size, layout, shape) {
      currentFrameUrl = url; currentSize = size; currentLayout = layout;
      const area = document.getElementById('captureArea');
      document.getElementById('frameOverlay').style.backgroundImage = `url('${url}')`;
      area.className = (layout === 'grid') ? 'landscape' : '';
      area.classList.add(`${shape}-slot`);
      photos = [];
      [1,2,3,4].forEach(i => document.getElementById(`photo${i}`).innerHTML = '');
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      document.getElementById('camera').srcObject = stream;
    }

    document.getElementById('captureBtn').onclick = () => {
      const v = document.getElementById('camera');
      const c = document.getElementById('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      const ctx = c.getContext('2d');
      ctx.translate(c.width, 0); ctx.scale(-1, 1);
      ctx.drawImage(v, 0, 0);
      const data = c.toDataURL('image/jpeg');
      if (photos.length < 4) {
        photos.push(data);
        document.getElementById(`photo${photos.length}`).innerHTML = `<img src="${data}" class="w-full h-full object-cover">`;
      }
    };

    // --- ฟังก์ชันดาวน์โหลดที่แก้ไขแล้ว ---
    document.getElementById('downloadBtn').onclick = async () => {
      const area = document.getElementById('captureArea');
      const frame = new Image();
      frame.crossOrigin = "anonymous";
      frame.src = currentFrameUrl;

      frame.onload = async () => {
        const finalCanvas = document.createElement('canvas');
        const fctx = finalCanvas.getContext('2d');
        
        // อ้างอิงขนาด Canvas ตามขนาดไฟล์กรอบรูปจริง (เช่น 600x1800 หรือ 1800x1200)
        finalCanvas.width = frame.width;
        finalCanvas.height = frame.height;

        // คำนวณ Ratio ระหว่าง Preview กับไฟล์จริง
        const ratio = finalCanvas.width / area.offsetWidth;

        // 1. วาดรูปถ่ายก่อน (วาดตามตำแหน่งที่ตาเห็นบน Preview เป๊ะๆ)
        for (let i = 0; i < photos.length; i++) {
          const imgEl = document.getElementById(`photo${i+1}`);
          const img = new Image();
          img.src = photos[i];
          await new Promise(r => img.onload = r);

          // ดึงค่าตำแหน่งจาก CSS มาคำนวณใหม่ให้ตรงกับ Canvas
          const x = imgEl.offsetLeft * ratio;
          const y = imgEl.offsetTop * ratio;
          const w = imgEl.offsetWidth * ratio;
          const h = imgEl.offsetHeight * ratio;

          // วาดรูป (ทำขอบมนตามความเหมาะสม)
          fctx.save();
          if(area.classList.contains('rounded-slot')) {
             const r = 20 * ratio; // รัศมีขอบมนตามสัดส่วน
             fctx.beginPath();
             fctx.roundRect(x, y, w, h, r);
             fctx.clip();
          }
          
          // วาดแบบ Crop Center (Manual Cover)
          const imgRatio = img.width / img.height;
          const targetRatio = w / h;
          let sx, sy, sw, sh;
          if(imgRatio > targetRatio) { sh = img.height; sw = sh * targetRatio; sx = (img.width - sw)/2; sy = 0; }
          else { sw = img.width; sh = sw / targetRatio; sx = 0; sy = (img.height - sh)/2; }
          
          fctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
          fctx.restore();
        }

        // 2. วาดกรอบทับด้านบนสุดเสมอ! (เพื่อไม่ให้รูปมุดหรือทับลายกรอบ)
        fctx.drawImage(frame, 0, 0, finalCanvas.width, finalCanvas.height);

        const link = document.createElement('a');
        link.download = 'Photo_KMUTT.png';
        link.href = finalCanvas.toDataURL('image/png');
        link.click();
      };
    };

    startCamera();
  </script>
</body>
</html>
