<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMUTT Photobooth - Choose Frame</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans Thai', sans-serif; touch-action: manipulation; }
    .gradient-bg { background: #b91c1c; } 
    
    #captureArea { 
      width: 220px; height: 600px; position: relative; background: #fff; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* เลเยอร์กรอบ */
    #frameOverlay { 
      position: absolute; inset: 0; z-index: 10; background-size: 100% 100%; background-repeat: no-repeat; pointer-events: none; 
      transition: background-image 0.3s ease;
    }
    
    /* เลเยอร์รูปถ่าย */
    .photo-item { 
      position: absolute; left: 15px; width: 190px; height: 140px; z-index: 100; background: #eee; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; display: flex; align-items: center; justify-content: center;
    }

    .photo-1 { top: 112px; }
    .photo-2 { top: 268px; }
    .photo-3 { top: 424px; }
    
    .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .mirror { transform: scaleX(-1); }
    #camera { border-radius: 1rem; width: 100%; background: #000; }

    /* ตกแต่งปุ่มเลือกกรอบ */
    .frame-thumb { width: 50px; height: 130px; border: 3px solid transparent; cursor: pointer; transition: 0.2s; border-radius: 5px; }
    .frame-thumb.active { border-color: #fff; transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
  </style>
</head>
<body class="h-full gradient-bg p-4 flex flex-col items-center">
  <div id="flashOverlay" class="fixed inset-0 z-[200] pointer-events-none"></div>
  
  <header class="text-center mb-6 text-white">
    <h1 class="text-3xl font-bold italic drop-shadow-lg">KMUTT PHOTOBOOTH</h1>
    <p class="text-sm opacity-90">เลือกกรอบที่ชอบก่อนถ่ายภาพ</p>
  </header>

  <div class="max-w-6xl w-full grid lg:grid-cols-3 gap-6 items-start">
    
    <div class="glass-card rounded-3xl p-6 text-center lg:col-span-1">
      <h2 class="text-white font-bold mb-4">🎨 เลือกรูปแบบกรอบ</h2>
      <div class="flex lg:flex-col flex-row justify-center gap-4 overflow-x-auto p-2">
        <img src="myframe.png" class="frame-thumb active" onclick="changeFrame('myframe.png', this)" title="กรอบที่ 1">
        <img src="myframe2.png" class="frame-thumb" onclick="changeFrame('myframe2.png', this)" title="กรอบที่ 2">
        </div>
    </div>

    <div class="glass-card rounded-3xl p-6 text-center lg:col-span-1">
      <div class="relative overflow-hidden bg-black rounded-2xl mb-4">
        <video id="camera" autoplay playsinline muted class="mirror"></video>
        <div id="countdown" class="absolute inset-0 flex items-center justify-center text-white text-9xl font-bold hidden">3</div>
      </div>
      <div class="grid grid-cols-4 gap-2">
        <button id="switchBtn" class="col-span-1 py-4 bg-gray-700 text-white rounded-full font-bold shadow-lg">🔄</button>
        <button id="captureBtn" class="col-span-3 py-4 bg-white text-red-600 rounded-full font-bold text-xl shadow-xl active:scale-95">📸 ถ่ายรูป</button>
      </div>
    </div>

    <div class="glass-card rounded-3xl p-6 flex flex-col items-center lg:col-span-1">
      <div id="captureArea">
        <div id="frameOverlay" style="background-image: url('myframe.png');"></div>
        <div id="photo1" class="photo-item photo-1"></div>
        <div id="photo2" class="photo-item photo-2"></div>
        <div id="photo3" class="photo-item photo-3"></div>
      </div>
      <div class="w-full mt-6 grid grid-cols-2 gap-3">
        <button id="resetBtn" class="py-3 bg-black/30 text-white rounded-2xl text-sm font-bold">🔄 เริ่มใหม่</button>
        <button id="downloadBtn" class="py-3 bg-green-600 text-white rounded-2xl font-bold">💾 บันทึกรูป (2x6")</button>
      </div>
    </div>

  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    let photos = [];
    let currentFacingMode = 'user';
    let stream = null;
    let currentFrameUrl = 'myframe.png'; // เก็บชื่อกรอบที่เลือก
    let frameImg = new Image();
    frameImg.src = currentFrameUrl;

    async function startCamera() {
      if (stream) stream.getTracks().forEach(track => track.stop());
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: false });
        document.getElementById('camera').srcObject = stream;
      } catch (e) { alert("เข้าถึงกล้องไม่ได้ครับ"); }
    }

    // ฟังก์ชันเปลี่ยนกรอบ
    function changeFrame(url, el) {
      currentFrameUrl = url;
      frameImg.src = url;
      document.getElementById('frameOverlay').style.backgroundImage = `url('${url}')`;
      
      // เปลี่ยนสถานะปุ่มที่เลือก
      document.querySelectorAll('.frame-thumb').forEach(img => img.classList.remove('active'));
      el.classList.add('active');
    }

    document.getElementById('switchBtn').onclick = () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      startCamera();
    };

    document.getElementById('captureBtn').onclick = () => {
      if (photos.length >= 3) return alert("ครบ 3 รูปแล้วครับ");
      let count = 3;
      const el = document.getElementById('countdown');
      el.classList.remove('hidden');
      const timer = setInterval(() => {
        count--; el.textContent = count;
        if(count <= 0) {
          clearInterval(timer); el.classList.add('hidden'); el.textContent = '3';
          takeShot();
        }
      }, 800);
    };

    function takeShot() {
      const v = document.getElementById('camera');
      const c = document.getElementById('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      const ctx = c.getContext('2d');
      if (currentFacingMode === 'user') {
        ctx.translate(c.width, 0); ctx.scale(-1, 1);
      }
      ctx.drawImage(v, 0, 0);
      const data = c.toDataURL('image/jpeg', 0.95);
      photos.push(data);
      const target = document.getElementById(`photo${photos.length}`);
      target.innerHTML = `<img src="${data}" style="width:100%; height:100%; object-fit:cover;">`;
      
      const flash = document.getElementById('flashOverlay');
      flash.classList.add('flash');
      setTimeout(() => flash.classList.remove('flash'), 200);
    }

    document.getElementById('downloadBtn').onclick = () => {
      if(photos.length < 3) return alert("ถ่ายให้ครบก่อนนะครับ");
      const finalCanvas = document.createElement('canvas');
      const fctx = finalCanvas.getContext('2d');
      finalCanvas.width = 600;
      finalCanvas.height = 1800;

      fctx.fillStyle = "#ffffff";
      fctx.fillRect(0, 0, 600, 1800);

      // วาดรูปกรอบที่เลือกไว้
      if(frameImg.complete) {
        fctx.drawImage(frameImg, 0, 0, 600, 1800);
      }

      // วาดรูปถ่าย 3 ใบ ทับหน้ากรอบ
      const photoW = 518;  const photoH = 382;  const photoX = 41;   
      const positionsY = [336, 804, 1272]; 

      photos.forEach((p, i) => {
        const img = new Image();
        img.src = p;
        fctx.fillStyle = "white";
        fctx.fillRect(photoX - 2, positionsY[i] - 2, photoW + 4, photoH + 4);
        fctx.drawImage(img, photoX, positionsY[i], photoW, photoH);
      });

      const link = document.createElement('a');
      link.download = `KMUTT-Photo.png`;
      link.href = finalCanvas.toDataURL('image/png');
      link.click();
    };

    document.getElementById('resetBtn').onclick = () => {
      photos = [];
      [1,2,3].forEach(i => document.getElementById(`photo${i}`).innerHTML = '');
    };

    startCamera();
  </script>
</body>
</html>
