<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMUTT Photobooth - Absolute Layer Fix</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
    * { font-family: 'Noto Sans Thai', sans-serif; touch-action: manipulation; }
    .gradient-bg { background: #b91c1c; } 
    
    /* พรีวิวบนหน้าจอ: บังคับลำดับชั้นด้วย Z-Index */
    #captureArea { 
      width: 220px; height: 600px; position: relative; background: #fff; overflow: hidden; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.6); margin: auto; z-index: 1; 
    }
    #captureArea.landscape { width: 340px; height: 226px; }
    #captureArea.portrait-4x6 { width: 233px; height: 350px; }

    /* กรอบรูปต้องอยู่หน้าสุดเสมอบนหน้าจอ (Z-index 999) */
    #frameOverlay { 
      position: absolute; inset: 0; z-index: 999 !important; 
      background-size: 100% 100%; background-repeat: no-repeat; pointer-events: none; 
    }
    
    /* รูปถ่ายต้องอยู่ล่างกรอบเสมอ (Z-index 10) */
    .photo-item { 
      position: absolute; z-index: 10 !important; 
      background: #eee; overflow: hidden; display: flex; align-items: center; justify-content: center; 
    }

    /* พิกัด 2x6 Strip */
    .photo-1 { left: 15px; width: 190px; height: 140px; top: 112px; }
    .photo-2 { left: 15px; width: 190px; height: 140px; top: 268px; }
    .photo-3 { left: 15px; width: 190px; height: 140px; top: 424px; }
    
    /* พิกัด 4x6 Wish Note แนวนอน */
    .landscape .photo-1 { left: 15px; width: 160px; height: 190px; top: 18px; }
    
    /* พิกัด 4x6 Wish Note แนวตั้ง */
    .portrait-4x6 .photo-1 { left: 18px; width: 197px; height: 150px; top: 15px; }

    .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .mirror { transform: scaleX(-1); }
    #camera { border-radius: 1rem; width: 100%; background: #000; aspect-ratio: 4/3; object-fit: cover; }
    .frame-thumb { width: 55px; border: 2px solid transparent; cursor: pointer; border-radius: 6px; background: #fff; transition: 0.2s; }
    .frame-thumb.active { border-color: #fff; transform: scale(1.1); }
  </style>
</head>
<body class="h-full gradient-bg p-4 flex flex-col items-center text-white">
  <header class="text-center mb-6"><h1 class="text-2xl font-bold italic uppercase tracking-widest">KMUTT Photobooth</h1></header>

  <div class="max-w-6xl w-full grid lg:grid-cols-3 gap-6 items-start">
    <div class="glass-card rounded-3xl p-5 text-center">
      <h2 class="text-xs font-bold mb-4 uppercase">🎨 Select Frame</h2>
      <div class="grid grid-cols-2 lg:grid-cols-1 gap-4 justify-items-center">
        <img src="myframe.png" class="frame-thumb active h-[100px]" onclick="changeFrame('myframe.png', '2x6', 'strip', this)">
        <img src="frame1.png" class="frame-thumb h-[100px]" onclick="changeFrame('frame1.png', '2x6', 'strip', this)">
        <img src="frame2.png" class="frame-thumb h-[100px]" onclick="changeFrame('frame2.png', '2x6', 'strip', this)">
        <img src="frame_4x6_note.png" class="frame-thumb h-[50px] w-[75px] mt-2" onclick="changeFrame('frame_4x6_note.png', '4x6', 'landscape', this)">
        <img src="frame_4x6_v.png" class="frame-thumb h-[75px] w-[50px] mt-2" onclick="changeFrame('frame_4x6_v.png', '4x6', 'portrait', this)">
      </div>
    </div>

    <div class="glass-card rounded-3xl p-5 text-center">
      <div class="relative overflow-hidden bg-black rounded-2xl mb-4">
        <video id="camera" autoplay playsinline muted class="mirror"></video>
        <div id="countdown" class="absolute inset-0 flex items-center justify-center text-8xl font-bold hidden">3</div>
      </div>
      <div class="flex gap-2">
        <button id="switchBtn" class="px-5 py-3 bg-gray-800 rounded-xl text-white">🔄</button>
        <button id="captureBtn" class="flex-1 py-3 bg-white text-red-600 rounded-xl font-bold text-lg active:scale-95">📸 ถ่ายรูป</button>
      </div>
    </div>

    <div class="glass-card rounded-3xl p-5 flex flex-col items-center">
      <div id="captureArea">
        <div id="photo1" class="photo-item photo-1"></div>
        <div id="photo2" class="photo-item photo-2"></div>
        <div id="photo3" class="photo-item photo-3"></div>
        <div id="frameOverlay" style="background-image: url('myframe.png');"></div>
      </div>
      <div class="w-full mt-6 grid grid-cols-2 gap-3">
        <button onclick="resetPhotos()" class="py-2.5 bg-black/40 text-white rounded-xl text-xs font-bold uppercase">ถ่ายใหม่</button>
        <button id="downloadBtn" class="py-2.5 bg-green-600 text-white rounded-xl font-bold text-xs shadow-lg uppercase">บันทึกรูป</button>
      </div>
    </div>
  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    let photos = []; let currentFacingMode = 'user'; let stream = null;
    let currentLayout = 'strip'; let currentFrameUrl = 'myframe.png'; 

    async function startCamera() {
      if (stream) stream.getTracks().forEach(track => track.stop());
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: 1280, height: 720 }, audio: false });
        document.getElementById('camera').srcObject = stream;
      } catch (e) { alert("เปิดกล้องไม่ได้ครับ"); }
    }

    function changeFrame(url, size, layout, el) {
      currentFrameUrl = url;
      currentLayout = layout;
      const area = document.getElementById('captureArea');
      document.getElementById('frameOverlay').style.backgroundImage = `url('${url}')`;
      
      area.className = ''; 
      if (layout === 'landscape') area.classList.add('landscape');
      if (layout === 'portrait') area.classList.add('portrait-4x6');

      document.querySelectorAll('.frame-thumb').forEach(img => img.classList.remove('active'));
      el.classList.add('active');
      resetPhotos();
    }

    document.getElementById('captureBtn').onclick = () => {
      const max = (currentLayout === 'strip') ? 3 : 1;
      if (photos.length >= max) return;
      let count = 3; const el = document.getElementById('countdown');
      el.classList.remove('hidden');
      const timer = setInterval(() => {
        count--; el.textContent = count;
        if(count <= 0) { clearInterval(timer); el.classList.add('hidden'); takeShot(); }
      }, 800);
    };

    function takeShot() {
      const v = document.getElementById('camera'); const c = document.getElementById('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      const ctx = c.getContext('2d');
      if (currentFacingMode === 'user') { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
      ctx.drawImage(v, 0, 0);
      const data = c.toDataURL('image/jpeg', 0.9);
      photos.push(data);
      document.getElementById(`photo${photos.length}`).innerHTML = `<img src="${data}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    // ฟังก์ชันดาวน์โหลด: แก้ปัญหาเลเยอร์มุดแบบ 100%
    document.getElementById('downloadBtn').onclick = async () => {
      const max = (currentLayout === 'strip') ? 3 : 1;
      if(photos.length < max) return alert("ถ่ายรูปไม่ครบครับ");
      
      const c = document.createElement('canvas'); const ctx = c.getContext('2d');
      
      const loadImage = (src) => new Promise(res => { 
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => res(img);
        img.src = src; 
      });

      // 1. กำหนดขนาดกระดาษ
      if (currentLayout === 'landscape') { c.width = 1800; c.height = 1200; }
      else if (currentLayout === 'portrait') { c.width = 1200; c.height = 1800; }
      else { c.width = 600; c.height = 1800; }

      // 2. เคลียร์พื้นหลังเป็นสีขาว
      ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height);

      // 3. วาดรูปถ่าย "ก่อน" (เลเยอร์ล่าง)
      if (currentLayout === 'landscape') {
        const pImg = await loadImage(photos[0]);
        ctx.drawImage(pImg, 80, 100, 850, 1000);
      } else if (currentLayout === 'portrait') {
        const pImg = await loadImage(photos[0]);
        ctx.drawImage(pImg, 100, 80, 1000, 770);
      } else {
        const py = [336, 804, 1272];
        for(let i=0; i<photos.length; i++){ 
          const pImg = await loadImage(photos[i]); 
          ctx.drawImage(pImg, 41, py[i], 518, 382); 
        }
      }

      // 4. วาดกรอบรูป "ทีหลังสุด" (เลเยอร์บนสุด) - บรรทัดนี้สำคัญที่สุด
      const fImg = await loadImage(currentFrameUrl + '?v=' + Date.now());
      ctx.drawImage(fImg, 0, 0, c.width, c.height);
      
      const link = document.createElement('a'); 
      link.download = `KMUTT-Booth.png`;
      link.href = c.toDataURL('image/png', 1.0); 
      link.click();
    };

    function resetPhotos() { photos = []; [1,2,3].forEach(i => document.getElementById(`photo${i}`).innerHTML = ''); }
    document.getElementById('switchBtn').onclick = () => { currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user'; startCamera(); };
    startCamera();
  </script>
</body>
</html>
