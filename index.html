<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMUTT Photobooth - Pro Multi-Frame</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ตั้งค่าฟอนต์และการป้องกันการซูม */
    * { font-family: 'Noto Sans Thai', sans-serif; touch-action: manipulation; }
    .gradient-bg { background: #b91c1c; } 
    
    /* พื้นที่แสดงผลพรีวิวบนจอ (ขนาด 220x600 px) */
    #captureArea { 
      width: 220px; height: 600px; position: relative; background: #fff; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    /* เลเยอร์กรอบ (อยู่ชั้นล่าง) */
    #frameOverlay { 
      position: absolute; inset: 0; z-index: 10; background-size: 100% 100%; background-repeat: no-repeat; pointer-events: none; 
      transition: background-image 0.3s ease;
    }
    
    /* เลเยอร์รูปถ่าย (z-index: 100 เพื่อให้อยู่ทับหน้ากรอบเสมอ) */
    .photo-item { 
      position: absolute; left: 15px; width: 190px; height: 140px; z-index: 100; background: #eee; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; display: flex; align-items: center; justify-content: center;
    }

    /* พิกัดตำแหน่งรูปถ่าย 1, 2, 3 บนจอ */
    .photo-1 { top: 112px; }
    .photo-2 { top: 268px; }
    .photo-3 { top: 424px; }
    
    .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .mirror { transform: scaleX(-1); }
    #camera { border-radius: 1rem; width: 100%; background: #000; height: auto; }

    /* ตกแต่งรูปตัวอย่างกรอบ */
    .frame-thumb { width: 65px; height: 160px; border: 3px solid transparent; cursor: pointer; transition: 0.2s; border-radius: 8px; background: #fff; object-fit: contain; }
    .frame-thumb.active { border-color: #fff; transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.6); }
  </style>
</head>
<body class="h-full gradient-bg p-4 flex flex-col items-center">
  <div id="flashOverlay" class="fixed inset-0 z-[200] pointer-events-none"></div>
  
  <header class="text-center mb-6 text-white">
    <h1 class="text-3xl font-bold italic drop-shadow-lg uppercase tracking-wider">KMUTT Photobooth</h1>
    <p class="text-sm opacity-90">เลือกกรอบที่ต้องการแล้วถ่ายภาพได้เลย!</p>
  </header>

  <div class="max-w-6xl w-full grid lg:grid-cols-3 gap-6 items-start">
    
    <div class="glass-card rounded-3xl p-6 text-center lg:col-span-1 order-2 lg:order-1">
      <h2 class="text-white font-bold mb-4">🎨 เลือกรูปแบบกรอบ</h2>
      <div class="flex lg:flex-col flex-row justify-center gap-6 overflow-x-auto p-2">
        <div class="flex flex-col items-center gap-2">
          <img src="myframe.png" class="frame-thumb active" onclick="changeFrame('myframe.png', this)">
          <span class="text-white text-xs font-bold bg-black/20 px-3 py-1 rounded-full">Classic Red</span>
        </div>
        <div class="flex flex-col items-center gap-2">
          <img src="frame1.png" class="frame-thumb" onclick="changeFrame('frame1.png', this)">
          <span class="text-white text-xs font-bold bg-black/20 px-3 py-1 rounded-full">New Design</span>
        </div>
      </div>
    </div>

    <div class="glass-card rounded-3xl p-6 text-center lg:col-span-1 order-1 lg:order-2">
      <div class="relative overflow-hidden bg-black rounded-2xl mb-4 shadow-inner">
        <video id="camera" autoplay playsinline muted class="mirror"></video>
        <div id="countdown" class="absolute inset-0 flex items-center justify-center text-white text-9xl font-bold hidden drop-shadow-2xl">3</div>
      </div>
      <div class="grid grid-cols-4 gap-3">
        <button id="switchBtn" class="col-span-1 py-4 bg-gray-800 text-white rounded-2xl font-bold shadow-lg hover:bg-gray-700 active:scale-90 transition-all">🔄</button>
        <button id="captureBtn" class="col-span-3 py-4 bg-white text-red-600 rounded-2xl font-bold text-xl shadow-xl hover:bg-gray-100 active:scale-95 transition-all">📸 ถ่ายรูป</button>
      </div>
    </div>

    <div class="glass-card rounded-3xl p-6 flex flex-col items-center lg:col-span-1 order-3">
      <div id="captureArea">
        <div id="frameOverlay" style="background-image: url('myframe.png');"></div>
        <div id="photo1" class="photo-item photo-1"></div>
        <div id="photo2" class="photo-item photo-2"></div>
        <div id="photo3" class="photo-item photo-3"></div>
      </div>
      <div class="w-full mt-6 grid grid-cols-2 gap-3">
        <button id="resetBtn" class="py-3 bg-black/40 text-white rounded-2xl text-sm font-bold border border-white/10 hover:bg-black/60">🔄 ถ่ายใหม่</button>
        <button id="downloadBtn" class="py-3 bg-green-600 text-white rounded-2xl font-bold shadow-lg hover:bg-green-700 transition-colors">💾 บันทึกรูป (2x6")</button>
      </div>
    </div>

  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    let photos = [];
    let currentFacingMode = 'user';
    let stream = null;
    let currentFrameUrl = 'myframe.png'; 
    let frameImg = new Image();
    frameImg.src = currentFrameUrl;

    async function startCamera() {
      if (stream) stream.getTracks().forEach(track => track.stop());
      try {
        const constraints = { video: { facingMode: currentFacingMode }, audio: false };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById('camera');
        video.srcObject = stream;
        
        if (currentFacingMode === 'user') video.classList.add('mirror');
        else video.classList.remove('mirror');
      } catch (e) { alert("ไม่สามารถเปิดกล้องได้ครับ"); }
    }

    function changeFrame(url, el) {
      currentFrameUrl = url;
      frameImg.src = url;
      document.getElementById('frameOverlay').style.backgroundImage = `url('${url}')`;
      document.querySelectorAll('.frame-thumb').forEach(img => img.classList.remove('active'));
      el.classList.add('active');
    }

    document.getElementById('switchBtn').onclick = () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      startCamera();
    };

    document.getElementById('captureBtn').onclick = () => {
      if (photos.length >= 3) return alert("ครบ 3 รูปแล้วครับ");
      let count = 3;
      const el = document.getElementById('countdown');
      el.classList.remove('hidden');
      const timer = setInterval(() => {
        count--; el.textContent = count;
        if(count <= 0) {
          clearInterval(timer); el.classList.add('hidden'); el.textContent = '3';
          takeShot();
        }
      }, 800);
    };

    function takeShot() {
      const v = document.getElementById('camera');
      const c = document.getElementById('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      const ctx = c.getContext('2d');
      if (currentFacingMode === 'user') {
        ctx.translate(c.width, 0); ctx.scale(-1, 1);
      }
      ctx.drawImage(v, 0, 0);
      const data = c.toDataURL('image/jpeg', 0.95);
      photos.push(data);
      const target = document.getElementById(`photo${photos.length}`);
      target.innerHTML = `<img src="${data}" style="width:100%; height:100%; object-fit:cover;">`;
      const flash = document.getElementById('flashOverlay');
      flash.classList.add('flash');
      setTimeout(() => flash.classList.remove('flash'), 200);
    }

    // ฟังก์ชันดาวน์โหลดขนาด 2x6 นิ้ว (600x1800 px)
    document.getElementById('downloadBtn').onclick = () => {
      if(photos.length < 3) return alert("กรุณาถ่ายภาพให้ครบ 3 รูปก่อนนะครับ");
      const finalCanvas = document.createElement('canvas');
      const fctx = finalCanvas.getContext('2d');
      finalCanvas.width = 600;
      finalCanvas.height = 1800;
      fctx.fillStyle = "#ffffff";
      fctx.fillRect(0, 0, 600, 1800);

      // วาดกรอบรูปที่เลือกไว้ (วาดก่อนเพื่อเป็นฉากหลัง)
      if(frameImg.complete) {
        fctx.drawImage(frameImg, 0, 0, 600, 1800);
      }

      // วาดรูปถ่ายคนทับหน้ากรอบ (ตามตำแหน่งที่คำนวณไว้)
      const photoW = 518;  const photoH = 382;  const photoX = 41;   
      const positionsY = [336, 804, 1272]; 

      photos.forEach((p, i) => {
        const img = new Image();
        img.src = p;
        fctx.fillStyle = "white";
        fctx.fillRect(photoX - 2, positionsY[i] - 2, photoW + 4, photoH + 4);
        fctx.drawImage(img, photoX, positionsY[i], photoW, photoH);
      });

      const link = document.createElement('a');
      link.download = `KMUTT-Photo-${Date.now()}.png`;
      link.href = finalCanvas.toDataURL('image/png', 1.0);
      link.click();
    };

    document.getElementById('resetBtn').onclick = () => {
      if(confirm("ถ่ายใหม่ทั้งหมด?")) {
        photos = [];
        [1,2,3].forEach(i => document.getElementById(`photo${i}`).innerHTML = '');
      }
    };

    startCamera();
  </script>
</body>
</html>
