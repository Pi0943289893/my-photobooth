<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KMUTT Photobooth - Heart Shape Edition</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    .gradient-bg { background: #b91c1c; }
    #captureArea { width: 220px; height: 600px; position: relative; background: #fff; overflow: hidden; border: 8px solid #fff; }
    /* CSS สำหรับแสดงผลหัวใจบนหน้าจอ */
    .heart-shape { clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'); scale: 1.2; }
    .photo-item { position: absolute; background: #eee; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .photo-1 { left: 15px; width: 190px; height: 160px; top: 80px; }
    .photo-2 { left: 15px; width: 190px; height: 160px; top: 260px; }
    .photo-3 { left: 15px; width: 190px; height: 160px; top: 440px; }
    .mirror { transform: scaleX(-1); }
  </style>
</head>
<body class="h-full gradient-bg p-4 flex flex-col items-center">

  <div id="qrModal" class="fixed inset-0 z-[300] hidden flex items-center justify-center bg-black/80">
    <div class="bg-white p-8 rounded-3xl text-center">
      <h3 class="font-bold mb-4">สแกนรับรูปหัวใจ ❤️</h3>
      <div id="qrcode" class="mb-4"></div>
      <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="px-6 py-2 bg-red-600 text-white rounded-xl">ปิด</button>
    </div>
  </div>

  <h1 class="text-white text-2xl font-bold mb-6">KMUTT HEART BOOTH</h1>

  <div class="grid lg:grid-cols-2 gap-10 items-center">
    <div class="bg-black/20 p-6 rounded-3xl">
        <video id="camera" autoplay playsinline class="mirror w-full rounded-2xl mb-4" style="height: 300px; object-fit: cover;"></video>
        <button id="captureBtn" class="w-full py-4 bg-white text-red-600 font-bold rounded-2xl text-xl">📸 ถ่ายรูปทรงหัวใจ</button>
        <div class="flex gap-2 mt-4">
            <button onclick="toggleHeart(true)" class="flex-1 py-2 bg-pink-500 text-white rounded-xl font-bold">เปิดทรงหัวใจ</button>
            <button onclick="toggleHeart(false)" class="flex-1 py-2 bg-gray-500 text-white rounded-xl font-bold">รูปสี่เหลี่ยมปกติ</button>
        </div>
    </div>

    <div class="flex flex-col items-center">
        <div id="captureArea">
            <div id="photo1" class="photo-item photo-1"></div>
            <div id="photo2" class="photo-item photo-2"></div>
            <div id="photo3" class="photo-item photo-3"></div>
        </div>
        <button id="downloadBtn" class="mt-6 px-10 py-3 bg-green-500 text-white font-bold rounded-full shadow-lg">💾 บันทึกรูป & รับ QR</button>
    </div>
  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    let photos = [];
    let isHeartMode = true; // เริ่มต้นเป็นทรงหัวใจ
    let stream = null;

    async function init() {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('camera').srcObject = stream;
    }

    function toggleHeart(on) {
        isHeartMode = on;
        [1,2,3].forEach(i => {
            const el = document.getElementById(`photo${i}`);
            if(on) el.classList.add('heart-shape');
            else el.classList.remove('heart-shape');
        });
    }

    document.getElementById('captureBtn').onclick = () => {
        if(photos.length >= 3) return alert("เต็มแล้วจ้าแม่");
        const v = document.getElementById('camera');
        const c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        const ctx = c.getContext('2d');
        ctx.translate(c.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(v, 0, 0);
        const data = c.toDataURL('image/jpeg');
        photos.push(data);
        const target = document.getElementById(`photo${photos.length}`);
        target.innerHTML = `<img src="${data}" class="w-full h-full object-cover">`;
        if(isHeartMode) target.classList.add('heart-shape');
    };

    // ฟังก์ชันวาดรูปหัวใจลง Canvas จริงเพื่อเซฟ
    function drawHeartOnCanvas(ctx, img, x, y, w, h) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x + w/2, y + h*0.3);
        ctx.bezierCurveTo(x + w/2, y, x, y, x, y + h*0.35);
        ctx.bezierCurveTo(x, y + h*0.7, x + w/2, y + h, x + w/2, y + h);
        ctx.bezierCurveTo(x + w/2, y + h, x + w, y + h*0.7, x + w, y + h*0.35);
        ctx.bezierCurveTo(x + w, y, x + w/2, y, x + w/2, y + h*0.3);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, x, y, w, h);
        ctx.restore();
    }

    document.getElementById('downloadBtn').onclick = async () => {
        if(photos.length < 3) return alert("ถ่ายให้ครบ 3 รูปก่อนนะแม่");
        const finalC = document.createElement('canvas');
        finalC.width = 600; finalC.height = 1800;
        const fctx = finalC.getContext('2d');
        fctx.fillStyle = "#ffffff";
        fctx.fillRect(0,0,600,1800);

        for(let i=0; i<3; i++) {
            const img = await new Promise(res => { const im = new Image(); im.onload=()=>res(im); im.src=photos[i]; });
            const py = [150, 650, 1150]; // ตำแหน่งวาดในกระดาษยาว
            if(isHeartMode) drawHeartOnCanvas(fctx, img, 50, py[i], 500, 450);
            else fctx.drawImage(img, 50, py[i], 500, 450);
        }

        const link = document.createElement('a');
        link.download = "HeartPhoto.png";
        link.href = finalC.toDataURL();
        link.click();
        
        // ตรงนี้ใส่ฟังก์ชัน uploadToImgBB เหมือนเดิมได้เลยครับแม่
    };

    init();
    toggleHeart(true); // เปิดโหมดหัวใจรอไว้เลย
  </script>
</body>
</html>
