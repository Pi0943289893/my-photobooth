<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMUTT Photobooth - Final Fix</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans Thai', sans-serif; touch-action: manipulation; }
    .gradient-bg { background: #b91c1c; } /* สีแดง มจธ. */
    
    /* 1. แก้ไขพื้นที่พรีวิวให้ตรงกับสัดส่วนกรอบของคุณ */
    #captureArea { 
      width: 220px; 
      height: 600px; 
      position: relative; 
      background: #fff; 
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* 2. บังคับให้กรอบ Canva อยู่ชั้นล่าง (z-index: 10) */
    #frameOverlay { 
      position: absolute; 
      inset: 0; 
      z-index: 10; 
      background-size: 100% 100%; 
      background-repeat: no-repeat;
      pointer-events: none; 
    }
    
    /* 3. บังคับให้รูปถ่ายลอยทับหน้าสุดเสมอ (z-index: 100) */
    .photo-item { 
      position: absolute; 
      left: 15px; 
      width: 190px; 
      height: 140px; 
      z-index: 100; 
      background: #eee; 
      border: 4px solid #fff; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
      overflow: hidden; 
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 4. ปรับพิกัดตำแหน่งรูปถ่าย 1, 2, 3 (เรียงจากบนลงล่าง) */
    .photo-1 { top: 112px; }
    .photo-2 { top: 268px; }
    .photo-3 { top: 424px; }
    
    .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    #camera { transform: scaleX(-1); border-radius: 1rem; width: 100%; height: auto; background: #000; }
    .flash { animation: flashAnim 0.2s ease-out; }
    @keyframes flashAnim { 0% { background: white; opacity: 1; } 100% { background: transparent; opacity: 0; } }
  </style>
</head>
<body class="h-full gradient-bg p-4 flex flex-col items-center">
  <div id="flashOverlay" class="fixed inset-0 z-[200] pointer-events-none"></div>
  
  <header class="text-center mb-6 text-white">
    <h1 class="text-3xl font-bold italic drop-shadow-lg">KMUTT BLOOD DONATION</h1>
    <p class="text-sm opacity-90">ถ่ายภาพที่ระลึก 3 ช็อต</p>
  </header>

  <div class="max-w-5xl w-full grid lg:grid-cols-2 gap-8 items-start">
    <div class="glass-card rounded-3xl p-6 text-center">
      <div class="relative overflow-hidden bg-black rounded-2xl mb-4">
        <video id="camera" autoplay playsinline muted></video>
        <div id="countdown" class="absolute inset-0 flex items-center justify-center text-white text-9xl font-bold hidden">3</div>
      </div>
      <button id="captureBtn" class="w-full py-5 bg-white text-red-600 rounded-full font-bold text-2xl shadow-xl active:scale-95 transition-all">📸 กดถ่ายรูป</button>
    </div>

    <div class="glass-card rounded-3xl p-6 flex flex-col items-center">
      <div id="captureArea">
        <div id="frameOverlay" style="background-image: url('myframe.png');"></div>
        <div id="photo1" class="photo-item photo-1"></div>
        <div id="photo2" class="photo-item photo-2"></div>
        <div id="photo3" class="photo-item photo-3"></div>
      </div>

      <div class="w-full mt-6 grid grid-cols-2 gap-3">
        <button id="resetBtn" class="py-3 bg-black/30 text-white rounded-2xl text-sm font-bold">🔄 เริ่มใหม่</button>
        <button id="downloadBtn" class="py-3 bg-green-600 text-white rounded-2xl font-bold">💾 ดาวน์โหลดรูป</button>
      </div>
    </div>
  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    let photos = [];
    let frameImg = new Image();
    frameImg.src = 'myframe.png';

    // เริ่มกล้องด้วยค่ามาตรฐานที่เสถียรที่สุด
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        document.getElementById('camera').srcObject = stream;
      } catch (e) { alert("ไม่สามารถเข้าถึงกล้องได้"); }
    }

    document.getElementById('captureBtn').onclick = () => {
      if (photos.length >= 3) return alert("ถ่ายครบ 3 รูปแล้วครับ");
      let count = 3;
      const el = document.getElementById('countdown');
      el.classList.remove('hidden');
      const timer = setInterval(() => {
        count--; el.textContent = count;
        if(count <= 0) {
          clearInterval(timer); el.classList.add('hidden'); el.textContent = '3';
          takeShot();
        }
      }, 800);
    };

    function takeShot() {
      const v = document.getElementById('camera');
      const c = document.getElementById('canvas');
      // ใช้ความละเอียดตามขนาดวิดีโอจริงเพื่อไม่ให้เน่า
      c.width = v.videoWidth; 
      c.height = v.videoHeight;
      const ctx = c.getContext('2d');
      ctx.translate(c.width, 0); ctx.scale(-1, 1);
      ctx.drawImage(v, 0, 0);
      
      const data = c.toDataURL('image/jpeg', 0.9);
      photos.push(data);
      
      // อัปเดตรูปถ่ายในพรีวิว (ลอยทับกรอบแน่นอน)
      const target = document.getElementById(`photo${photos.length}`);
      target.innerHTML = `<img src="${data}" style="width:100%; height:100%; object-fit:cover;">`;
      
      const flash = document.getElementById('flashOverlay');
      flash.classList.add('flash');
      setTimeout(() => flash.classList.remove('flash'), 200);
    }

    // แก้ไขระบบดาวน์โหลดให้รูปทับกรอบและภาพชัด
    document.getElementById('downloadBtn').onclick = () => {
      if(photos.length < 3) return alert("ถ่ายให้ครบ 3 รูปก่อนนะครับ");
      
      const finalCanvas = document.createElement('canvas');
      const fctx = finalCanvas.getContext('2d');
      const scale = 3; // เพิ่มความชัด 3 เท่า

      finalCanvas.width = 220 * scale;
      finalCanvas.height = 600 * scale;
      fctx.scale(scale, scale);

      // 1. วาดพื้นขาว
      fctx.fillStyle = "#ffffff";
      fctx.fillRect(0, 0, 220, 600);

      // 2. วาดกรอบเป็นพื้นหลัง (อยู่ล่างรูปคน)
      if(frameImg.complete) {
        fctx.drawImage(frameImg, 0, 0, 220, 600);
      }

      // 3. วาดรูปคนทับหน้ากรอบ (อยู่บนสุดตามที่คุณต้องการ)
      const positions = [112, 268, 424];
      photos.forEach((p, i) => {
        const img = new Image();
        img.src = p;
        // วาดขอบขาวรูปถ่าย
        fctx.fillStyle = "white";
        fctx.fillRect(15, positions[i], 190, 140);
        // วาดรูปคน (เว้นขอบ 4px)
        fctx.drawImage(img, 19, positions[i] + 4, 182, 132);
      });

      const link = document.createElement('a');
      link.download = `KMUTT-Photo.png`;
      link.href = finalCanvas.toDataURL('image/png');
      link.click();
    };

    document.getElementById('resetBtn').onclick = () => {
      photos = [];
      [1,2,3].forEach(i => document.getElementById(`photo${i}`).innerHTML = '');
    };

    startCamera();
  </script>
</body>
</html>
