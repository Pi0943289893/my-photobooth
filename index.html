<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMUTT Photobooth - Final Fix V34</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans Thai', sans-serif; touch-action: manipulation; }
    .gradient-bg { background: #b91c1c; } 
    
    #captureArea { 
      width: 220px; height: 600px; position: relative; background: #fff; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
      /* แก้ไขให้กึ่งกลางบนโทรศัพท์ */
      margin: auto; display: block;
    }
    
    #captureArea.landscape { width: 350px; height: 233px; }
    #captureArea.portrait-4x6 { width: 233px; height: 350px; }

    #frameOverlay { 
      position: absolute; inset: 0; z-index: 10; background-size: 100% 100%; background-repeat: no-repeat; pointer-events: none; 
      transition: all 0.3s ease;
    }
    
    .photo-item { 
      position: absolute; z-index: 100; background: #eee; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; display: flex; align-items: center; justify-content: center;
      transition: border-radius 0.3s ease;
    }

    /* ความโค้งมนสำหรับช่อง Nun & Ton (บนหน้าจอ) */
    .rounded-slot .photo-item { border-radius: 30px; } 
    .square-slot .photo-item { border-radius: 0px; }

    /* พิกัด 2x6 Strip เดิม */
    .photo-1 { left: 15px; width: 190px; height: 140px; top: 112px; }
    .photo-2 { left: 15px; width: 190px; height: 140px; top: 268px; }
    .photo-3 { left: 15px; width: 190px; height: 140px; top: 424px; }
    
    /* พิกัด 4x6 Grid เดิม */
    .landscape .photo-1 { left: 20px; width: 145px; height: 90px; top: 20px; }
    .landscape .photo-2 { left: 185px; width: 145px; height: 90px; top: 20px; }
    .landscape .photo-3 { left: 20px; width: 145px; height: 90px; top: 120px; }
    .landscape .photo-4 { left: 185px; width: 145px; height: 90px; top: 120px; display: flex; }
    
    .portrait-4x6 .photo-1 { left: 20px; width: 193px; height: 150px; top: 20px; }
    .photo-4 { display: none; } 

    .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .mirror { transform: scaleX(-1); }
    #camera { border-radius: 1rem; width: 100%; background: #000; aspect-ratio: 4/3; object-fit: cover; }

    /* ปุ่มเลือกกรอบแบบ Thumbnail */
    .frame-thumb { width: 65px; border: 3px solid transparent; cursor: pointer; transition: 0.2s; border-radius: 8px; background: #fff; }
    .frame-thumb.active { border-color: #fff; transform: scale(1.05); }
    
    /* ปรับแต่ง Scrollbar สำหรับเมนูเลือกกรอบ */
    .custom-scrollbar::-webkit-scrollbar { height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    
    /* ปรับแก้ Z-Index ของCountdown ให้ชัดเจนบนมือถือ */
    #countdown { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 150; font-weight: bold; }
  </style>
</head>
<body class="h-full gradient-bg p-4 flex flex-col items-center text-white">
  <header class="text-center mb-6"><h1 class="text-3xl font-bold italic uppercase tracking-wider drop-shadow-lg">KMUTT Photobooth</h1></header>

  <div class="max-w-6xl w-full grid lg:grid-cols-3 gap-6 items-start">
    
    <div class="glass-card rounded-3xl p-5 text-center lg:col-span-1">
      <h2 class="text-xs font-bold mb-4 uppercase">🎨 Select Frame</h2>
      <div class="flex lg:flex-col flex-row justify-start items-center gap-6 overflow-x-auto lg:overflow-y-auto lg:max-h-[500px] p-2 custom-scrollbar">
        
        <div class="flex flex-col items-center gap-1 shrink-0">
          <img src="myframe.png" class="frame-thumb active h-[100px]" onclick="changeFrame('myframe.png', '2x6', 'strip', 'square', this)">
          <span class="text-white text-[9px] font-bold">Classic Red</span>
        </div>

        <div class="flex flex-col items-center gap-1 shrink-0">
          <img src="frame_pink.png" class="frame-thumb h-[100px]" onclick="changeFrame('frame_pink.png', '2x6', 'strip', 'rounded', this)">
          <span class="text-white text-[9px] font-bold">PINK (Rounded)</span>
        </div>

        <div class="flex flex-col items-center gap-1 shrink-0">
          <img src="frame_4x6.png" class="frame-thumb h-[60px] w-[90px] mt-8" onclick="changeFrame('frame_4x6.png', '4x6', 'grid', 'square', this)">
          <span class="text-white text-[9px] font-bold">4x6 Jumbo</span>
        </div>

        <div class="flex flex-col items-center gap-1 shrink-0">
          <img src="frame_4x6_note.png" class="frame-thumb h-[60px] w-[90px] mt-8" onclick="changeFrame('frame_4x6_note.png', '4x6', 'wish-note-land', 'square', this)">
          <span class="text-white text-[9px] font-bold">Note (H)</span>
        </div>
        
        <div class="flex flex-col items-center gap-1 shrink-0">
          <img src="frame_4x6_v.png" class="frame-thumb h-[90px] w-[60px] mt-4" onclick="changeFrame('frame_4x6_v.png', '4x6', 'portrait', 'square', this)">
          <span class="text-white text-[9px] font-bold">Note (V)</span>
        </div>

      </div>
    </div>

    <div class="glass-card rounded-3xl p-5 text-center lg:col-span-1">
      <div class="relative overflow-hidden bg-black rounded-2xl mb-4 shadow-xl">
        <video id="camera" autoplay playsinline muted class="mirror"></video>
        <div id="countdown" class="text-9xl text-white hidden">3</div>
      </div>
      <div class="flex gap-2 text-black">
        <button id="switchBtn" class="px-5 py-3 bg-gray-800 rounded-xl text-white active:scale-90 transition-all">🔄</button>
        <button id="captureBtn" class="flex-1 py-3 bg-white text-red-600 rounded-xl font-bold text-lg active:scale-95 transition-all">📸 กดถ่ายรูป</button>
      </div>
    </div>

    <div class="glass-card rounded-3xl p-5 flex flex-col items-center text-black">
      <div id="captureArea" class="square-slot">
        <div id="photo1" class="photo-item photo-1"></div>
        <div id="photo2" class="photo-item photo-2"></div>
        <div id="photo3" class="photo-item photo-3"></div>
        <div id="photo4" class="photo-item photo-4"></div>
        <div id="frameOverlay" style="background-image: url('myframe.png');"></div>
      </div>
      <div class="w-full mt-6 grid grid-cols-2 gap-3">
        <button id="resetBtn" class="py-2.5 bg-black/40 rounded-xl text-xs font-bold uppercase text-white">🔄 ล้างรูป</button>
        <button id="downloadBtn" class="py-2.5 bg-green-600 text-white rounded-xl font-bold text-xs shadow-lg uppercase">💾 SAVE PHOTO</button>
      </div>
    </div>

  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    let photos = []; let currentFacingMode = 'user'; let stream = null;
    let currentSize = '2x6'; let currentLayout = 'strip'; let currentShape = 'square'; // square/rounded
    let currentFrameUrl = 'myframe.png'; 

    async function startCamera() {
      if (stream) stream.getTracks().forEach(track => track.stop());
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: false });
        document.getElementById('camera').srcObject = stream;
      } catch (e) { alert("เปิดกล้องไม่ได้ครับ"); }
    }

    // ฟังก์ชันเปลี่ยนกรอบ: ล็อก Layer ตามความต้องการของคุณ
    function changeFrame(url, size, layout, shape, el) {
      currentFrameUrl = url; currentSize = size; currentLayout = layout; currentShape = shape;
      const area = document.getElementById('captureArea');
      const overlay = document.getElementById('frameOverlay');
      overlay.style.backgroundImage = `url('${url}')`;
      
      area.className = ''; 
      area.classList.add(`${shape}-slot`); // คุมความโค้งบนหน้าจอ

      if (layout === 'grid' || layout === 'wish-note-land') area.classList.add('landscape');
      else if (layout === 'portrait') area.classList.add('portrait-4x6');
      if (layout === 'wish-note-land') area.classList.add('wish-note-land');

      document.querySelectorAll('.frame-thumb').forEach(img => img.classList.remove('active'));
      el.classList.add('active');
      photos = []; [1,2,3,4].forEach(i => document.getElementById(`photo${i}`).innerHTML = '');
    }

    document.getElementById('captureBtn').onclick = () => {
      const max = (currentLayout === 'grid') ? 4 : (currentLayout === 'strip' ? 3 : 1);
      if (photos.length >= max) return;
      let count = 3; const el = document.getElementById('countdown');
      el.classList.remove('hidden'); el.textContent = count;
      const timer = setInterval(() => {
        count--; el.textContent = count;
        if(count <= 0) { clearInterval(timer); el.classList.add('hidden'); takeShot(); }
      }, 800);
    };

    function takeShot() {
      const v = document.getElementById('camera'); const c = document.getElementById('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      const ctx = c.getContext('2d');
      if (currentFacingMode === 'user') { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
      ctx.drawImage(v, 0, 0);
      const data = c.toDataURL('image/jpeg', 0.9);
      photos.push(data);
      document.getElementById(`photo${photos.length}`).innerHTML = `<img src="${data}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    // ฟังก์ชันดาวน์โหลด: แก้ไขลำดับการวาดให้ถูกต้อง
    document.getElementById('downloadBtn').onclick = async () => {
      const max = (currentLayout === 'grid') ? 4 : (currentLayout === 'strip' ? 3 : 1);
      if(photos.length < max) return;
      
      const c = document.createElement('canvas'); const ctx = c.getContext('2d');
      
      const loadImage = (src) => new Promise(res => { 
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => res(img);
        img.src = src; 
      });

      // 1. กำหนดขนาดกระดาษและพื้นหลัง
      if (currentLayout === 'wish-note-land') { c.width = 1800; c.height = 1200; }
      else if (currentSize === '4x6') { c.width = (currentLayout === 'portrait') ? 1200 : 1800; c.height = (currentLayout === 'portrait') ? 1800 : 1200; }
      else { c.width = 600; c.height = 1800; }
      ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height);

      // 2. วาดคนก่อน (เลเยอร์ล่าง)
      if (currentLayout === 'wish-note-land') {
        const pImg = await loadImage(photos[0]); ctx.drawImage(pImg, 102, 102, 822, 996);
      } else if (currentLayout === 'grid') {
        const gridPos = [{x:102,y:102},{x:954,y:102},{x:102,y:618},{x:954,y:618}];
        for(let i=0; i<4; i++) { const img = await loadImage(photos[i]); ctx.drawImage(img, gridPos[i].x, gridPos[i].y, 744, 480); }
      } else if (currentLayout === 'portrait') {
        const img = await loadImage(photos[0]); ctx.drawImage(img, 100, 100, 1000, 770);
      } else {
        const py = [336, 804, 1272];
        for(let i=0; i<photos.length; i++){ const pImg = await loadImage(photos[i]); ctx.drawImage(pImg, 41, py[i], 518, 382); }
      }

      // 3. วาดกรอบรูป "ทีหลังสุด" (เลเยอร์บนสุด) - บรรทัดนี้สำคัญที่สุด
      const fImg = await loadImage(currentFrameUrl + '?v=' + Date.now());
      ctx.drawImage(fImg, 0, 0, c.width, c.height);
      
      const link = document.createElement('a'); 
      link.download = `KMUTT-Photo-${Date.now()}.png`; link.href = c.toDataURL('image/png', 1.0); link.click();
    };

    function resetPhotos() { photos = []; [1,2,3,4].forEach(i => document.getElementById(`photo${i}`).innerHTML = ''); }
    document.getElementById('switchBtn').onclick = () => { currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user'; startCamera(); };
    startCamera();
  </script>
</body>
</html>
