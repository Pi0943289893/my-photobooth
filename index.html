<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMUTT Photobooth PRO - QR Ready</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans Thai', sans-serif; touch-action: manipulation; }
    .gradient-bg { background: #b91c1c; } 
    #captureArea { width: 220px; height: 600px; position: relative; background: #fff; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
    #captureArea.landscape { width: 350px; height: 233px; }
    #captureArea.portrait-4x6 { width: 233px; height: 350px; }
    #frameOverlay { position: absolute; inset: 0; z-index: 10; background-size: 100% 100%; background-repeat: no-repeat; pointer-events: none; }
    .photo-item { position: absolute; z-index: 100; background: #eee; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; display: flex; align-items: center; justify-content: center; transition: border-radius 0.3s ease; }
    .rounded-slot .photo-item { border-radius: 30px; } 
    .square-slot .photo-item { border-radius: 0px; }   

    /* พิกัด 3 รูปมาตรฐาน */
    .photo-1 { left: 15px; width: 190px; height: 140px; top: 112px; }
    .photo-2 { left: 15px; width: 190px; height: 140px; top: 268px; }
    .photo-3 { left: 15px; width: 190px; height: 140px; top: 424px; }
    
    .strip-2 .photo-1 { left: 15px; width: 190px; height: 140px; top: 215px; }
    .strip-2 .photo-2 { left: 15px; width: 190px; height: 140px; top: 375px; }
    .strip-2 .photo-3 { display: none; }

    .landscape .photo-1 { left: 20px; width: 145px; height: 90px; top: 20px; }
    .landscape .photo-2 { left: 185px; width: 145px; height: 90px; top: 20px; }
    .landscape .photo-3 { left: 20px; width: 145px; height: 90px; top: 120px; }
    .landscape .photo-4 { left: 185px; width: 145px; height: 90px; top: 120px; display: flex; }
    
    .wish-note-land .photo-1 { left: 15px; width: 185px; height: 193px; top: 20px; }
    .portrait-4x6 .photo-1 { left: 15px; width: 203px; height: 155px; top: 20px; }
    
    .photo-4 { display: none; } 
    .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .mirror { transform: scaleX(-1); }
    #camera { border-radius: 1rem; width: 100%; background: #000; height: 300px; object-fit: cover; }
    .frame-thumb { width: 65px; border: 3px solid transparent; cursor: pointer; transition: 0.2s; border-radius: 8px; background: #fff; }
    .frame-thumb.active { border-color: #fff; transform: scale(1.05); }
    
    /* Loading Spinner */
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #b91c1c; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="h-full gradient-bg p-4 flex flex-col items-center">

  <div id="qrModal" class="fixed inset-0 z-[300] bg-black/90 hidden flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl text-center max-w-sm w-full">
      <h3 class="text-xl font-bold text-gray-800 mb-2">รับรูปภาพของคุณ</h3>
      <p class="text-gray-500 text-sm mb-6">สแกน QR Code เพื่อดาวน์โหลดรูปลงมือถือ</p>
      <div id="qrcode" class="flex justify-center mb-6"></div>
      <div id="uploadStatus" class="hidden flex-col items-center gap-2">
        <div class="loader"></div>
        <p class="text-sm text-gray-600">กำลังประมวลผล...</p>
      </div>
      <button onclick="closeQR()" class="w-full py-3 bg-gray-100 text-gray-800 rounded-2xl font-bold">ปิดหน้าต่าง</button>
    </div>
  </div>

  <header class="text-center mb-6 text-white"><h1 class="text-3xl font-bold italic drop-shadow-lg uppercase">KMUTT Photobooth PRO</h1></header>

  <div class="max-w-6xl w-full grid lg:grid-cols-3 gap-6 items-start">
    <div class="glass-card rounded-3xl p-6 text-center lg:col-span-1">
      <h2 class="text-white font-bold mb-4 uppercase">🎨 เลือกรูปแบบ</h2>
      <div class="flex lg:flex-col flex-row justify-start gap-6 overflow-x-auto p-2">
        <div class="flex flex-col items-center gap-2"><img src="myframe.png" class="frame-thumb active h-[140px]" onclick="changeFrame('myframe.png', '2x6', 'strip', 'square', this)"><span class="text-white text-[10px] font-bold">2x6" Classic</span></div>
        <div class="flex flex-col items-center gap-2"><img src="frame_4x6.png" class="frame-thumb h-[60px] w-[90px] mt-10" onclick="changeFrame('frame_4x6.png', '4x6', 'grid', 'square', this)"><span class="text-white text-[10px] font-bold">4x6" Jumbo</span></div>
      </div>
    </div>

    <div class="glass-card rounded-3xl p-6 text-center lg:col-span-1">
      <div class="relative overflow-hidden bg-black rounded-2xl mb-4">
        <video id="camera" autoplay playsinline muted class="mirror"></video>
        <div id="countdown" class="absolute inset-0 flex items-center justify-center text-white text-9xl font-bold hidden">3</div>
      </div>
      <div class="grid grid-cols-4 gap-3">
        <button id="switchBtn" class="col-span-1 py-4 bg-gray-800 text-white rounded-2xl">🔄</button>
        <button id="captureBtn" class="col-span-3 py-4 bg-white text-red-600 rounded-2xl font-bold text-xl active:scale-95">📸 ถ่ายรูป</button>
      </div>
    </div>

    <div class="glass-card rounded-3xl p-6 flex flex-col items-center lg:col-span-1">
      <div id="captureArea" class="square-slot">
        <div id="frameOverlay" style="background-image: url('myframe.png');"></div>
        <div id="photo1" class="photo-item photo-1"></div>
        <div id="photo2" class="photo-item photo-2"></div>
        <div id="photo3" class="photo-item photo-3"></div>
        <div id="photo4" class="photo-item photo-4"></div>
      </div>
      <div class="w-full mt-6 grid grid-cols-2 gap-3">
        <button id="resetBtn" class="py-3 bg-black/40 text-white rounded-2xl text-sm font-bold uppercase">🔄 ล้างรูป</button>
        <button id="downloadBtn" class="py-3 bg-green-600 text-white rounded-2xl font-bold shadow-lg uppercase">💾 บันทึกรูป & QR</button>
      </div>
    </div>
  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    let photos = []; 
    let currentFacingMode = 'user'; 
    let stream = null;
    let currentSize = '2x6'; 
    let currentLayout = 'strip'; 
    let currentFrameUrl = 'myframe.png'; 
    let frameImg = new Image(); 
    frameImg.src = currentFrameUrl;

    // --- กล้อง ---
    async function startCamera() {
      if (stream) stream.getTracks().forEach(track => track.stop());
      try { 
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: false }); 
        const v = document.getElementById('camera');
        v.srcObject = stream;
        v.className = (currentFacingMode === 'user') ? 'mirror' : '';
      } catch (e) { alert("เปิดกล้องไม่ได้ครับ"); }
    }

    function changeFrame(url, size, layout, shape, el) {
      currentFrameUrl = url; currentSize = size; currentLayout = layout; frameImg.src = url;
      const area = document.getElementById('captureArea'); 
      const overlay = document.getElementById('frameOverlay');
      overlay.style.backgroundImage = `url('${url}')`;
      area.className = ''; area.classList.add(`${shape}-slot`);
      
      if (layout === 'strip-2') area.classList.add('strip-2');
      if (layout === 'grid' || layout === 'wish-note-land') area.classList.add('landscape');
      else if (layout === 'portrait') area.classList.add('portrait-4x6');

      document.querySelectorAll('.frame-thumb').forEach(img => img.classList.remove('active'));
      el.classList.add('active'); 
      resetPhotos();
    }

    document.getElementById('captureBtn').onclick = () => {
      let maxPhotos = (currentLayout === 'grid') ? 4 : (currentLayout === 'strip-2' ? 2 : (currentLayout === 'strip' ? 3 : 1));
      if (photos.length >= maxPhotos) return alert(`ครบ ${maxPhotos} รูปแล้วครับ`);
      
      let count = 3; 
      const el = document.getElementById('countdown'); 
      el.textContent = count;
      el.classList.remove('hidden');
      
      const timer = setInterval(() => {
        count--;
        if(count <= 0) { 
          clearInterval(timer); 
          el.classList.add('hidden'); 
          takeShot(); 
        } else {
          el.textContent = count;
        }
      }, 800);
    };

    function takeShot() {
      const v = document.getElementById('camera'); 
      const c = document.getElementById('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      const ctx = c.getContext('2d'); 
      if (currentFacingMode === 'user') { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
      ctx.drawImage(v, 0, 0); 
      const data = c.toDataURL('image/jpeg', 0.95);
      photos.push(data); 
      document.getElementById(`photo${photos.length}`).innerHTML = `<img src="${data}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    // --- รวมรูปและจัดการ QR ---
    document.getElementById('downloadBtn').onclick = async () => {
      let max = (currentLayout === 'grid') ? 4 : (currentLayout === 'strip-2' ? 2 : (currentLayout === 'strip' ? 3 : 1));
      if(photos.length < max) return alert("ถ่ายไม่ครบครับ");

      const finalCanvas = await generateFinalCanvas();
      
      // 1. ดาวน์โหลดลงเครื่อง (Optional)
      const link = document.createElement('a');
      link.download = `KMUTT_Photo.png`;
      link.href = finalCanvas.toDataURL('image/png', 1.0);
      link.click();

      // 2. อัปโหลดและแสดง QR
      uploadAndGenerateQR(finalCanvas);
    };

    async function generateFinalCanvas() {
      const finalCanvas = document.createElement('canvas');
      const fctx = finalCanvas.getContext('2d');
      const radius = document.getElementById('captureArea').classList.contains('rounded-slot') ? 40 : 0; 

      if (currentSize === '4x6') {
        finalCanvas.width = (currentLayout === 'portrait') ? 1200 : 1800;
        finalCanvas.height = (currentLayout === 'portrait') ? 1800 : 1200;
      } else {
        finalCanvas.width = 600; finalCanvas.height = 1800;
      }

      fctx.fillStyle = "#ffffff";
      fctx.fillRect(0,0,finalCanvas.width,finalCanvas.height);
      if(frameImg.complete) fctx.drawImage(frameImg, 0, 0, finalCanvas.width, finalCanvas.height);

      // วาดรูปภาพลงในช่อง (Logic เดิม)
      for(let i=0; i<photos.length; i++) {
        const img = await new Promise(res => { const img = new Image(); img.onload=()=>res(img); img.src=photos[i]; });
        // ตัวอย่างพิกัด (อิงจากโค้ดเดิมของคุณ)
        if (currentSize === '2x6') {
            const py = (currentLayout === 'strip-2') ? [645, 1125] : [336, 804, 1272];
            drawRoundedImage(fctx, img, 41, py[i], 518, 382, radius);
        } else {
            // Logic 4x6 (Grid/Note) ใส่พิกัดตามที่คุณเคยตั้งไว้
            const gridPos = [{x:102,y:102},{x:954,y:102},{x:102,y:618},{x:954,y:618}];
            if (currentLayout === 'grid') drawRoundedImage(fctx, img, gridPos[i].x, gridPos[i].y, 744, 480, radius);
        }
      }
      return finalCanvas;
    }

    async function uploadAndGenerateQR(canvas) {
      const apiKey = 'ใส่_API_KEY_ของคุณที่นี่'; 
      if(apiKey.includes('ใส่_API')) return alert("กรุณาใส่ ImgBB API Key ในโค้ดก่อนครับ");

      const qrModal = document.getElementById('qrModal');
      const qrDisplay = document.getElementById('qrcode');
      const status = document.getElementById('uploadStatus');
      
      qrDisplay.innerHTML = "";
      status.classList.remove('hidden');
      qrModal.classList.remove('hidden');

      const imageData = canvas.toDataURL('image/png').split(',')[1];
      const formData = new FormData();
      formData.append('image', imageData);

      try {
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, { method: 'POST', body: formData });
        const result = await response.json();
        if (result.success) {
          status.classList.add('hidden');
          new QRCode(qrDisplay, { text: result.data.url, width: 200, height: 200, colorDark: "#b91c1c" });
        }
      } catch (e) { alert("อัปโหลดไม่สำเร็จ"); closeQR(); }
    }

    function drawRoundedImage(ctx, img, x, y, w, h, r) {
        ctx.save(); ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(x, y, w, h, r); else ctx.rect(x,y,w,h);
        ctx.clip();
        const imgRatio = img.width / img.height; const targetRatio = w / h;
        let sx, sy, sw, sh;
        if (imgRatio > targetRatio) { sh = img.height; sw = img.height * targetRatio; sx = (img.width - sw) / 2; sy = 0; }
        else { sw = img.width; sh = img.width / targetRatio; sx = 0; sy = (img.height - sh) / 2; }
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h); ctx.restore();
    }

    function closeQR() { document.getElementById('qrModal').classList.add('hidden'); }
    function resetPhotos() { photos = []; [1,2,3,4].forEach(i => document.getElementById(`photo${i}`).innerHTML = ''); }
    document.getElementById('resetBtn').onclick = resetPhotos;
    document.getElementById('switchBtn').onclick = () => { currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user'; startCamera(); };
    
    startCamera();
  </script>
</body>
</html>
